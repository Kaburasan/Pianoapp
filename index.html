    function getAudioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }
    function playPianoNote(noteName, duration = 0.8) {
      const FREQS = {
        C3:130.81,D3:146.83,E3:164.81,F3:174.61,G3:196.00,A3:220.00,B3:246.94,
        "C#3":138.59,"D#3":155.56,"F#3":185.00,"G#3":207.65,"A#3":233.08,
        C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
        "C#4":277.18,"D#4":311.13,"F#4":369.99,"G#4":415.30,"A#4":466.16,
        C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880.00,B5:987.77,
        "C#5":554.37,"D#5":622.25,"F#5":739.99,"G#5":830.61,"A#5":932.33,
        C6:1046.50,D6:1174.66,E6:1318.51,F6:1396.91,G6:1567.98,A6:1760.00,B6:1975.53,
        "C#6":1108.73,"D#6":1244.51,"F#6":1479.98,"G#6":1661.22,"A#6":1864.66,
      };
      try {
        const ctx = getAudioCtx();
        if (ctx.state === "suspended") ctx.resume();
        const freq = FREQS[noteName] || 261.63;
        const osc1 = ctx.createOscillator();
        const osc2 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        const gain2 = ctx.createGain();
        const master = ctx.createGain();
        osc1.connect(gain1); gain1.connect(master);
        osc2.connect(gain2); gain2.connect(master);
        master.connect(ctx.destination);
        osc1.type = "triangle"; osc2.type = "sine";
        osc1.frequency.value = freq; osc2.frequency.value = freq * 2;
        const now = ctx.currentTime;
        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.32, now + 0.01);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
        gain2.gain.setValueAtTime(0, now);
        gain2.gain.linearRampToValueAtTime(0.07, now + 0.01);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.5);
        osc1.start(now); osc1.stop(now + duration + 0.1);
        osc2.start(now); osc2.stop(now + duration + 0.1);
      } catch(e) {}
    }

    // ── PIANO KEYBOARD COMPONENT ───────────────────────────────────────────────
    function PianoKeyboard({ level, noteStyle, highlightNote, onNotePlay, showLabels=true }) {
      const [pressed, setPressed] = useState({});
      const isExplorer = level === "explorer";
      const WK_W = 38, WK_H = 175, BK_W = 24, BK_H = 105;
      const totalW = WHITE_KEYS.length * WK_W;

      const handlePress = useCallback((fullNote) => {
        playPianoNote(fullNote);
        setPressed(p => ({...p, [fullNote]:true}));
        onNotePlay && onNotePlay(fullNote);
        setTimeout(() => setPressed(p => { const n={...p}; delete n[fullNote]; return n; }), 280);
      }, [onNotePlay]);

      const getNoteLabel = (note) => NOTE_LABEL[noteStyle]?.[note] || note;

      return (
        <div style={{overflowX:"auto", paddingBottom:10, WebkitOverflowScrolling:"touch"}}>
          <div style={{position:"relative", width:totalW, height:WK_H+12, margin:"0 auto",
            filter:"drop-shadow(0 8px 24px rgba(0,0,0,0.16))"}}>
            {WHITE_KEYS.map(({note,oct},i) => {
              const full = `${note}${oct}`;
              const isHL = highlightNote === full;
              const isPr = !!pressed[full];
              const col  = NOTE_COLORS[note];
              return (
                <div key={full+i} onPointerDown={e=>{e.preventDefault();handlePress(full);}}
                  style={{position:"absolute", left:i*WK_W, top:0, width:WK_W-2, height:WK_H,
                    background: isPr?col : isHL?col+"CC":"#FFFDF5",
                    border:`1.5px solid ${isHL?col:"#D8D0C0"}`,
                    borderRadius:"0 0 9px 9px",
                    display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"flex-end",
                    paddingBottom:7, cursor:"pointer", zIndex:1, userSelect:"none",
                    transform: isPr?"scaleY(0.97) translateY(3px)":"none",
                    boxShadow: isPr?"none":"0 5px 0 #B8AF9C",
                    transition:"background 0.08s,transform 0.08s,box-shadow 0.08s"}}>
                  {showLabels && (
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                      {isExplorer && <span style={{fontSize:13,lineHeight:1}}>{NOTE_ANIMALS[note]}</span>}
                      <span style={{fontSize:isExplorer?9:8, fontWeight:800,
                        color:isHL?col:"#999", fontFamily:"'Fredoka One',cursive", lineHeight:1.2}}>
                        {getNoteLabel(note)}
                      </span>
                    </div>
                  )}
                </div>
              );
            })}
            {BLACK_KEY_MAP.map(({note,oct,afterIdx}) => {
              const full = `${note}${oct}`;
              const isPr = !!pressed[full];
              const isHL = highlightNote === full;
              return (
                <div key={full} onPointerDown={e=>{e.preventDefault();handlePress(full);}}
                  style={{position:"absolute",
                    left:(afterIdx+1)*WK_W - BK_W/2 - 1,
                    top:0, width:BK_W, height:BK_H,
                    background:isPr?"#777":isHL?"#555":"#222",
                    borderRadius:"0 0 6px 6px",
                    cursor:"pointer", zIndex:3, userSelect:"none",
                    boxShadow:isPr?"none":"0 4px 0 #111",
                    transform:isPr?"translateY(3px)":"none",
                    transition:"background 0.08s,transform 0.08s,box-shadow 0.08s",
                    display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:4}}>
                  {!isExplorer && (
                    <span style={{fontSize:7,color:"#aaa",fontWeight:700}}>
                      {(SHARP_LABEL[noteStyle]||SHARP_LABEL.abc)[note]}
                    </span>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ── NOTE EXPLORER ──────────────────────────────────────────────────────────
    function NoteExplorer({level, noteStyle}) {
      const [lastNote,setLastNote] = useState(null);
      const [animKey,setAnimKey]   = useState(0);
      const isSharp  = lastNote ? lastNote.includes("#") : false;
      const baseNote = lastNote ? lastNote.replace(/[#\d]/g,"") : null;
      const handlePlay = note => { setLastNote(note); setAnimKey(k=>k+1); };
      const funName = NOTE_FUN[noteStyle]||NOTE_FUN.abc;
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:20}}>
          <p style={{textAlign:"center",fontSize:14,color:"#666",maxWidth:440}}>
            Press any key! Each note has a name, colour, and an animal friend 🎹
          </p>
          <PianoKeyboard level={level} noteStyle={noteStyle} onNotePlay={handlePlay} showLabels />
          <div style={{minHeight:110,display:"flex",alignItems:"center",justifyContent:"center"}}>
            {lastNote && !isSharp && baseNote && NOTE_ANIMALS[baseNote] ? (
              <div key={animKey} style={{
                background:`${NOTE_COLORS[baseNote]}22`,
                border:`2.5px solid ${NOTE_COLORS[baseNote]}`,
                borderRadius:24, padding:"16px 36px", textAlign:"center",
                animation:"pop 0.3s cubic-bezier(.36,.07,.19,.97) both"}}>
                <div style={{fontSize:40}}>{NOTE_ANIMALS[baseNote]}</div>
                <div style={{fontSize:20,fontWeight:800,color:NOTE_COLORS[baseNote],fontFamily:"'Fredoka One',cursive"}}>
                  {funName[baseNote]}
                </div>
                <div style={{fontSize:12,color:"#888",marginTop:3}}>{lastNote}</div>
              </div>
            ) : lastNote ? (
              <div key={animKey} style={{background:"#2D2D2D",borderRadius:20,
                padding:"14px 28px",textAlign:"center",animation:"pop 0.3s ease both"}}>
                <div style={{fontSize:22,color:"#fff",fontWeight:900,fontFamily:"'Fredoka One',cursive"}}>
                  {lastNote.replace("#","♯")}
                </div>
                <div style={{fontSize:12,color:"#aaa",marginTop:3}}>Sharp key ✨</div>
              </div>
            ) : (
              <div style={{color:"#ccc",fontSize:14}}>← Press a key above!</div>
            )}
          </div>
        </div>
      );
    }

    // ── SONG PLAYER ────────────────────────────────────────────────────────────
    function SongPlayer({song, level, noteStyle}) {
      const [currentIdx,setCurrentIdx] = useState(-1);
      const [isPlaying,setIsPlaying]   = useState(false);
      const [completed,setCompleted]   = useState(false);
      const [mode,setMode]             = useState("demo");
      const [score,setScore]           = useState(0);
      const [streak,setStreak]         = useState(0);
      const timerRef = useRef([]);
      const clearTimers = () => { timerRef.current.forEach(clearTimeout); timerRef.current=[]; };

      const playDemo = () => {
        clearTimers(); setIsPlaying(true); setCompleted(false); setCurrentIdx(-1);
        let delay=80;
        song.notes.forEach((note,i) => {
          const t=setTimeout(()=>{ setCurrentIdx(i); playPianoNote(note,(song.timing[i]||400)/1000*0.85); }, delay);
          timerRef.current.push(t);
          delay+=(song.timing[i]||400)+60;
        });
        const end=setTimeout(()=>{ setIsPlaying(false); setCurrentIdx(-1); setCompleted(true); }, delay);
        timerRef.current.push(end);
      };
      const startPlay = () => { clearTimers(); setMode("play"); setCurrentIdx(0); setScore(0); setStreak(0); setCompleted(false); };
      const handleNotePlay = note => {
        if (mode!=="play"||completed) return;
        const idx=currentIdx<0?0:currentIdx;
        if (idx>=song.notes.length) return;
        if (note===song.notes[idx]) {
          const ns=streak+1; setStreak(ns);
          setScore(s=>s+10+(ns>=3?5:0));
          const next=idx+1; setCurrentIdx(next);
          if (next>=song.notes.length) setCompleted(true);
        }
      };
      useEffect(()=>()=>clearTimers(),[]);

      const hlNote = currentIdx>=0&&currentIdx<song.notes.length ? song.notes[currentIdx] : null;
      const progress = mode==="play"&&currentIdx>0 ? Math.round((currentIdx/song.notes.length)*100) : 0;

      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:16}}>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{ setMode("demo"); setCompleted(false); setCurrentIdx(-1); setIsPlaying(false); clearTimers(); }}
              style={{padding:"9px 20px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:800,fontSize:13,
                background:mode==="demo"?"#FF6B9D":"#F0F0F0",color:mode==="demo"?"#fff":"#555",transition:"all 0.2s"}}>
              👀 Watch Demo
            </button>
            <button onClick={startPlay}
              style={{padding:"9px 20px",borderRadius:20,border:"none",cursor:"pointer",fontWeight:800,fontSize:13,
                background:mode==="play"?"#845EF7":"#F0F0F0",color:mode==="play"?"#fff":"#555",transition:"all 0.2s"}}>
              🎹 I'll Play!
            </button>
          </div>
          {mode==="demo" && (
            <button onClick={playDemo} disabled={isPlaying}
              style={{padding:"11px 32px",borderRadius:24,border:"none",cursor:isPlaying?"default":"pointer",
                background:isPlaying?"#CCC":"linear-gradient(135deg,#FF6B9D,#845EF7)",
                color:"#fff",fontWeight:900,fontSize:15,boxShadow:isPlaying?"none":"0 4px 16px rgba(132,94,247,0.3)"}}>
              {isPlaying?"♪ Playing…":"▶  Play Demo"}
            </button>
          )}
          {mode==="play"&&!completed && (
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:12,color:"#888"}}>Note {Math.min(Math.max(currentIdx,0)+1,song.notes.length)} / {song.notes.length}</div>
              <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:5}}>
                <span style={{fontWeight:800,fontSize:18,color:"#845EF7"}}>⭐ {score}</span>
                {streak>=3&&<span style={{fontWeight:800,fontSize:14,color:"#FF6B9D"}}>🔥 ×{streak}</span>}
              </div>
              <div style={{width:260,height:7,background:"#F0F0F0",borderRadius:4,marginTop:7,overflow:"hidden"}}>
                <div style={{width:`${progress}%`,height:"100%",
                  background:"linear-gradient(90deg,#FF6B9D,#845EF7)",borderRadius:4,transition:"width 0.2s"}}/>
              </div>
            </div>
          )}
          <PianoKeyboard level={level} noteStyle={noteStyle} highlightNote={hlNote} onNotePlay={handleNotePlay} showLabels />
          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center",maxWidth:560}}>
            {song.notes.map((note,i) => {
              const base=note.replace(/[#\d]/g,"");
              const playIdx=currentIdx<0?0:currentIdx;
              const done = mode==="play"?i<playIdx:(isPlaying&&i<currentIdx);
              const active = (mode==="demo"?currentIdx:playIdx)===i&&(mode==="play"||currentIdx>=0);
              const label = note.includes("#")
                ? (SHARP_LABEL[noteStyle]||SHARP_LABEL.abc)[note.replace(/\d/,"")]||note.replace(/\d/,"")
                : (NOTE_LABEL[noteStyle]||NOTE_LABEL.abc)[base]||base;
              return (
                <div key={i} style={{minWidth:28,height:28,borderRadius:7,display:"flex",alignItems:"center",
                  justifyContent:"center",fontSize:9,fontWeight:800,padding:"0 3px",
                  background:done?(NOTE_COLORS[base]||"#845EF7"):active?(NOTE_COLORS[base]||"#845EF7")+"55":"#F0F0F0",
                  color:done?"#fff":active?"#444":"#bbb",
                  border:active?`2px solid ${NOTE_COLORS[base]||"#845EF7"}`:"2px solid transparent",
                  transition:"all 0.15s"}}>
                  {label}
                </div>
              );
            })}
          </div>
          {completed && (
            <div style={{background:"linear-gradient(135deg,#FF6B9D15,#845EF715)",
              border:"2px solid #FF6B9D",borderRadius:20,padding:"16px 28px",textAlign:"center",animation:"fadeIn 0.4s ease"}}>
              <div style={{fontSize:32}}>🎉</div>
              <div style={{fontWeight:900,fontSize:17,color:"#FF6B9D"}}>
                {mode==="play"?`Brilliant! You scored ${score} points!`:"That's how it sounds!"}
              </div>
              <div style={{fontSize:12,color:"#888",marginTop:4}}>
                {mode==="demo"?"Now try playing it yourself →":"Play again to beat your score!"}
              </div>
            </div>
          )}
        </div>
      );
    }

            {lesson.steps.map((_,i)=>(

          <div style={{display:"flex",gap:10,justifyContent:"space-between"}}>

                  border:"none",background:"#FF6B9D",color:"#fff",fontWeight:900,fontSize:14,cursor:"pointer"}}>Next →</button>}
          </div>
        </div>
      );
    }

    // ── THEORY FLASHCARDS ──────────────────────────────────────────────────────
    function TheoryCards({level}) {
      const cards=THEORY_CARDS[level]||THEORY_CARDS.explorer;
      const [idx,setIdx]=useState(0);
      const [flipped,setFlipped]=useState(false);
      const safeIdx=Math.min(idx,cards.length-1);
      const prev=()=>{ setIdx(i=>i<=0?cards.length-1:i-1); setFlipped(false); };
      const next=()=>{ setIdx(i=>i>=cards.length-1?0:i+1); setFlipped(false); };
      const card=cards[safeIdx];
      return (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:18}}>
          <div style={{fontSize:12,color:"#888"}}>Card {safeIdx+1} of {cards.length}</div>
          <div onClick={()=>setFlipped(f=>!f)} style={{
            width:310,minHeight:185,borderRadius:22,cursor:"pointer",
            background:flipped?"linear-gradient(135deg,#845EF7,#FF6B9D)":"linear-gradient(135deg,#FF6B9D,#FF9F43)",
            display:"flex",alignItems:"center",justifyContent:"center",
            padding:26,textAlign:"center",
            boxShadow:"0 10px 36px rgba(0,0,0,0.14)",transition:"background 0.35s ease"}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:16,lineHeight:1.6,whiteSpace:"pre-line"}}>
              {flipped?card.a:card.q}
              {!flipped&&<div style={{marginTop:12,fontSize:11,opacity:0.75}}>👆 Tap to reveal!</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={prev} style={{padding:"9px 22px",borderRadius:14,border:"2px solid #E0E0E0",
              background:"none",cursor:"pointer",fontWeight:800,color:"#666"}}>← Prev</button>
            <button onClick={next} style={{padding:"9px 22px",borderRadius:14,border:"none",
              background:"#845EF7",color:"#fff",cursor:"pointer",fontWeight:800}}>Next →</button>
          </div>
          <div style={{display:"flex",gap:6}}>
            {cards.map((_,i)=>(
              <div key={i} onClick={()=>{setIdx(i);setFlipped(false);}} style={{
                width:8,height:8,borderRadius:"50%",cursor:"pointer",
                background:i===safeIdx?"#845EF7":"#DDD",transition:"background 0.2s"}}/>
            ))}
          </div>
        </div>
      );
    }

              {Object.entries(LEVELS).map(([key,val])=>(
                <button key={key} onClick={()=>setLevel(key)}
                  style={{width:"100%",marginBottom:8,padding:"12px 16px",borderRadius:16,
                    border:`2px solid ${level===key?val.color:"#F0F0F0"}`,
                    background:level===key?val.color+"15":"#fff",
                    cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.2s",textAlign:"left"}}>
                  <span style={{fontSize:22}}>{val.label.split(" ")[0]}</span>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:900,fontSize:14,color:level===key?val.color:"#333"}}>{val.label.split(" ").slice(1).join(" ")}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>Age {val.age}</div>
                  </div>
                  {level===key&&<span style={{fontSize:16,color:val.color}}>✓</span>}
                </button>
              ))}
            </div>

            {/* Note style */}
            <div style={{marginBottom:28}}>
              <div style={{fontSize:13,fontWeight:800,color:"#555",marginBottom:10,textTransform:"uppercase",letterSpacing:1}}>
                🎵 Note Naming System
              </div>
              <div style={{display:"flex",gap:10}}>
                {[
                  {key:"abc",    label:"ABC",     sub:"C D E F G A B",    emoji:"🔤"},
                  {key:"doremi", label:"Do Re Mi", sub:"Do Re Mi Fa Sol…", emoji:"🎶"},
                ].map(({key,label,sub,emoji})=>(
                  <button key={key} onClick={()=>setNoteStyle(key)}
                    style={{flex:1,padding:"12px 10px",borderRadius:16,
                      border:`2px solid ${noteStyle===key?"#845EF7":"#F0F0F0"}`,
                      background:noteStyle===key?"#845EF715":"#fff",
                      cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}>
                    <div style={{fontSize:20,marginBottom:4}}>{emoji}</div>
                    <div style={{fontWeight:900,fontSize:13,color:noteStyle===key?"#845EF7":"#333"}}>{label}</div>
                    <div style={{fontSize:10,color:"#aaa",marginTop:2}}>{sub}</div>
                  </button>
                ))}
              </div>
            </div>

            <button onClick={()=>onStart(level,noteStyle)}
              style={{width:"100%",padding:"14px",borderRadius:18,border:"none",
                background:`linear-gradient(${lvl.grad})`,
                color:"#fff",fontWeight:900,fontSize:17,cursor:"pointer",
                boxShadow:"0 6px 20px rgba(0,0,0,0.15)",fontFamily:"'Fredoka One',cursive",letterSpacing:0.5}}>
              Let's Play! 🎹
            </button>
          </div>
        </div>
      );
    }

    // ── ROOT APP ───────────────────────────────────────────────────────────────
    function PianoApp() {
      const [screen,setScreen]               = useState("setup"); // "setup"|"app"
      const [level,setLevel]                 = useState("explorer");
      const [noteStyle,setNoteStyle]         = useState("abc");
      const [tab,setTab]                     = useState("explore");
      const [selectedLesson,setSelectedLesson] = useState(null);
      const [selectedSong,setSelectedSong]   = useState(null);
      const [completedLessons,setCompletedLessons] = useState([]);

      const lvl = LEVELS[level];
      const unlockAudio = () => { try{ getAudioCtx().resume(); }catch(e){} };

      const filteredLessons = useMemo(()=>LESSONS.filter(l=>l.levels.includes(level)),[level]);
      const filteredSongs   = useMemo(()=>{
        if (level==="explorer")   return SONGS.filter(s=>s.level==="explorer");
        if (level==="adventurer") return SONGS.filter(s=>s.level!=="musician");
        return SONGS;
      },[level]);

      const switchLevel = k => { setLevel(k); setSelectedSong(null); setSelectedLesson(null); };
      const switchTab   = t => { setTab(t); setSelectedSong(null); };

      if (screen==="setup") {
        return <SetupScreen onStart={(lv,ns)=>{ setLevel(lv); setNoteStyle(ns); setScreen("app"); }} />;
      }

      const TABS=[
        {id:"explore", label:"🎹 Explore"},
        {id:"lessons", label:"📚 Learn"},
        {id:"songs",   label:"🎵 Songs"},
        {id:"theory",  label:"🃏 Theory"},
        {id:"teacher", label:"👩‍🏫 Parent"},
      ];

      if (selectedLesson) {
        return (
          <div onPointerDown={unlockAudio}
            style={{minHeight:"100vh",background:"#FAF8FF",
              display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <LessonViewer lesson={selectedLesson} onClose={()=>{
              setCompletedLessons(c=>[...new Set([...c,selectedLesson.id])]);
              setSelectedLesson(null);
            }}/>
          </div>
        );
      }

      return (
        <div onPointerDown={unlockAudio} style={{minHeight:"100vh",background:"#FAF8FF"}}>

          {/* HEADER */}
          <div style={{background:`linear-gradient(${lvl.grad})`,padding:"14px 16px 12px",textAlign:"center"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <button onClick={()=>setScreen("setup")}
                style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:10,
                  padding:"5px 10px",color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>
                ⚙ Setup
              </button>
              <div style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"'Fredoka One',cursive",letterSpacing:0.5}}>
                🎹 Piano Adventure
              </div>
              {/* Note style toggle */}
              <button onClick={()=>setNoteStyle(s=>s==="abc"?"doremi":"abc")}
                style={{background:"rgba(255,255,255,0.2)",border:"none",borderRadius:10,
                  padding:"5px 10px",color:"#fff",fontSize:11,fontWeight:800,cursor:"pointer"}}>
                {noteStyle==="abc"?"Do Re Mi":"ABC"}
              </button>
            </div>
            {/* Level pills */}
            <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
              {Object.entries(LEVELS).map(([key,val])=>(
                <button key={key} onClick={()=>switchLevel(key)}
                  style={{padding:"5px 14px",borderRadius:16,
                    border:`2px solid ${level===key?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.35)"}`,
                    background:level===key?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.15)",
                    color:level===key?val.color:"#fff",
                    fontWeight:900,fontSize:11,cursor:"pointer",transition:"all 0.2s"}}>
                  {val.label}
                </button>
              ))}
            </div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.65)",marginTop:4}}>
              Age {lvl.age} · {noteStyle==="abc"?"ABC notation":"Do Re Mi notation"}
            </div>
          </div>

          {/* TABS */}
          <div style={{display:"flex",background:"#fff",boxShadow:"0 2px 10px rgba(0,0,0,0.07)",overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t.id} onClick={()=>switchTab(t.id)}
                style={{flex:"0 0 auto",padding:"12px 14px",border:"none",background:"none",
                  cursor:"pointer",whiteSpace:"nowrap",fontWeight:800,fontSize:12,
                  color:tab===t.id?lvl.color:"#aaa",
                  borderBottom:`3px solid ${tab===t.id?lvl.color:"transparent"}`,transition:"all 0.2s"}}>
                {t.label}
              </button>
            ))}
          </div>

          {/* CONTENT */}
          <div style={{padding:"20px 14px",maxWidth:680,margin:"0 auto"}}>

            {tab==="explore"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#333"}}>🎹 Free Explore</div>
                  <p style={{fontSize:13,color:"#888",marginTop:3}}>Press any key and discover the sounds!</p>
                </div>
                <NoteExplorer level={level} noteStyle={noteStyle}/>
              </div>
            )}

            {tab==="lessons"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{marginBottom:16}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#333"}}>📚 Lessons</div>
                  <p style={{fontSize:13,color:"#888",marginTop:3}}>{filteredLessons.length} lessons for {lvl.label}</p>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {filteredLessons.map(lesson=>{
                    const done=completedLessons.includes(lesson.id);
                    return (
                      <button key={lesson.id} onClick={()=>setSelectedLesson(lesson)}
                        style={{background:done?`${lvl.color}12`:"#fff",
                          border:`2px solid ${done?lvl.color:"#F0F0F0"}`,
                          borderRadius:18,padding:"14px 18px",textAlign:"left",
                          cursor:"pointer",display:"flex",alignItems:"center",gap:12,transition:"all 0.2s"}}>
                        <span style={{fontSize:26}}>{lesson.emoji}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:900,fontSize:14,color:"#333"}}>{lesson.title}</div>
                          <div style={{fontSize:11,color:"#aaa",marginTop:1}}>{lesson.steps.length} steps</div>
                        </div>
                        {done&&<span style={{fontSize:16}}>✅</span>}
                        <span style={{color:"#ccc",fontSize:18}}>›</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {tab==="songs"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                {selectedSong?(
                  <div>
                    <button onClick={()=>setSelectedSong(null)}
                      style={{background:"none",border:"none",color:"#888",cursor:"pointer",
                        fontWeight:800,marginBottom:14,fontSize:13}}>← All Songs</button>
                    <div style={{textAlign:"center",marginBottom:18}}>
                      <div style={{fontSize:28}}>{selectedSong.emoji}</div>
                      <div style={{fontSize:20,fontWeight:900,color:"#333"}}>{selectedSong.title}</div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                        {selectedSong.notes.length} notes · {LEVELS[selectedSong.level]?.label}
                      </div>
                    </div>
                    <SongPlayer song={selectedSong} level={level} noteStyle={noteStyle}/>
                  </div>
                ):(
                  <div>
                    <div style={{marginBottom:16}}>
                      <div style={{fontSize:20,fontWeight:900,color:"#333"}}>🎵 Songs to Play</div>
                      <p style={{fontSize:13,color:"#888",marginTop:3}}>{filteredSongs.length} songs at your level</p>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                      {filteredSongs.map(song=>(
                        <button key={song.id} onClick={()=>setSelectedSong(song)}
                          style={{background:"#fff",border:"2px solid #F0F0F0",borderRadius:18,
                            padding:"14px 18px",textAlign:"left",cursor:"pointer",
                            display:"flex",alignItems:"center",gap:12,transition:"all 0.2s"}}>
                          <span style={{fontSize:26}}>{song.emoji}</span>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:900,fontSize:14,color:"#333"}}>{song.title}</div>
                            <div style={{fontSize:11,color:"#aaa",marginTop:1}}>
                              {song.notes.length} notes · {LEVELS[song.level]?.label}
                            </div>
                          </div>
                          <span style={{color:"#ccc",fontSize:18}}>›</span>
                        </button>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {tab==="theory"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <div style={{textAlign:"center",marginBottom:18}}>
                  <div style={{fontSize:20,fontWeight:900,color:"#333"}}>🃏 Theory Cards</div>
                  <p style={{fontSize:13,color:"#888",marginTop:3}}>
                    {(THEORY_CARDS[level]||[]).length} cards · tap to reveal!
                  </p>
                </div>
                <TheoryCards key={level} level={level}/>
              </div>
            )}

            {tab==="teacher"&&(
              <div style={{animation:"fadeIn 0.3s ease"}}>
                <TeacherSection/>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PianoApp/>);
  </script>
</body>
</html>
