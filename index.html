  'C#6':1108.73,'D#6':1244.51,'F#6':1479.98,'G#6':1661.22,'A#6':1864.66,
};
function playNote(name,dur=0.8){
  try{
    const ctx=getCtx();
    if(ctx.state==='suspended')ctx.resume();
    const f=FREQS[name]||261.63;
    const o1=ctx.createOscillator(),o2=ctx.createOscillator();
    const g1=ctx.createGain(),g2=ctx.createGain(),gm=ctx.createGain();
    o1.connect(g1);g1.connect(gm);o2.connect(g2);g2.connect(gm);gm.connect(ctx.destination);
    o1.type='triangle';o2.type='sine';o1.frequency.value=f;o2.frequency.value=f*2;
    const t=ctx.currentTime;
    g1.gain.setValueAtTime(0,t);g1.gain.linearRampToValueAtTime(0.32,t+0.01);g1.gain.exponentialRampToValueAtTime(0.001,t+dur);
    g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(0.07,t+0.01);g2.gain.exponentialRampToValueAtTime(0.001,t+dur*0.5);
    o1.start(t);o1.stop(t+dur+0.1);o2.start(t);o2.stop(t+dur+0.1);
  }catch(e){}
}

// ── PIANO KEYBOARD ────────────────────────────────────────────────────────────
function PianoKeyboard({level,noteStyle,highlightNote,onNotePlay,showLabels=true,keyScale=1}){
  const [pressed,setPressed]=useState({});
  const isExp=level==='explorer';
  const WW=Math.round(38*keyScale),WH=Math.round(175*keyScale),BW=Math.round(24*keyScale),BH=Math.round(105*keyScale);
  const TW=WK.length*WW;
  const press=useCallback(full=>{
    playNote(full);
    setPressed(p=>({...p,[full]:true}));
    onNotePlay&&onNotePlay(full);
    setTimeout(()=>setPressed(p=>{const n={...p};delete n[full];return n;}),280);
  },[onNotePlay]);
  const lbl=n=>(NL[noteStyle]||NL.abc)[n]||n;
  const slbl=n=>(SL[noteStyle]||SL.abc)[n]||n;
  return h('div',{style:{overflowX:'auto',paddingBottom:10,WebkitOverflowScrolling:'touch'}},
    h('div',{style:{position:'relative',width:TW,height:WH+12,margin:'0 auto',
      filter:'drop-shadow(0 8px 24px rgba(0,0,0,0.16))'}},
      ...WK.map(({note,oct},i)=>{
        const full=`${note}${oct}`,isHL=highlightNote===full,isPr=!!pressed[full],col=NC[note];
        return h('div',{key:full+i,onPointerDown:e=>{e.preventDefault();press(full);},
          style:{position:'absolute',left:i*WW,top:0,width:WW-2,height:WH,
            background:isPr?col:isHL?col+'CC':'#FFFDF5',
            border:`1.5px solid ${isHL?col:'#D8D0C0'}`,borderRadius:`0 0 ${Math.round(9*keyScale)}px ${Math.round(9*keyScale)}px`,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'flex-end',
            paddingBottom:Math.round(7*keyScale),cursor:'pointer',zIndex:1,userSelect:'none',
            transform:isPr?'scaleY(0.97) translateY(3px)':'none',
            boxShadow:isPr?'none':'0 5px 0 #B8AF9C',
            transition:'background 0.08s,transform 0.08s,box-shadow 0.08s'}},
          showLabels&&h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:1}},
            isExp&&h('span',{style:{fontSize:Math.round(13*keyScale),lineHeight:1}},NA[note]),
            h('span',{style:{fontSize:Math.max(7,Math.round((isExp?9:8)*keyScale)),fontWeight:800,
              color:isHL?col:'#999',fontFamily:"'Fredoka One',cursive",lineHeight:1.2}},lbl(note))
          )
        );
      }),
      ...BK.map(({note,oct,ai})=>{
        const full=`${note}${oct}`,isPr=!!pressed[full],isHL=highlightNote===full;
        return h('div',{key:full,onPointerDown:e=>{e.preventDefault();press(full);},
          style:{position:'absolute',left:(ai+1)*WW-BW/2-1,top:0,width:BW,height:BH,
            // FIX: yellow highlight for black keys, visible against dark background
            background:isPr?'#888':isHL?'#FFE066':'#222',
            borderRadius:`0 0 ${Math.round(6*keyScale)}px ${Math.round(6*keyScale)}px`,
            cursor:'pointer',zIndex:3,userSelect:'none',
            boxShadow:isPr?'none':'0 4px 0 #111',
            transform:isPr?'translateY(3px)':'none',
            transition:'background 0.08s,transform 0.08s,box-shadow 0.08s',
            display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:4}},
          !isExp&&h('span',{style:{fontSize:Math.max(6,Math.round(7*keyScale)),color:isHL?'#333':'#aaa',fontWeight:700}},slbl(note))
        );
      })
    )
  );
}

// ── NOTE EXPLORER ─────────────────────────────────────────────────────────────
function NoteExplorer({level,noteStyle,keyScale}){
  const [last,setLast]=useState(null);
  const [ak,setAk]=useState(0);
  const isSharp=last?last.includes('#'):false;
  const base=last?last.replace(/[#\d]/g,''):null;
  const fn=NF[noteStyle]||NF.abc;
  const play=n=>{setLast(n);setAk(k=>k+1);};
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:20}},
    h('p',{style:{textAlign:'center',fontSize:14,color:'#666',maxWidth:440}},
      'Press any key! Each note has a name, colour, and an animal friend 🎹'),
    h(PianoKeyboard,{level,noteStyle,onNotePlay:play,showLabels:true,keyScale}),
    h('div',{style:{minHeight:110,display:'flex',alignItems:'center',justifyContent:'center'}},
      last&&!isSharp&&base&&NA[base]
        ?h('div',{key:ak,style:{background:`${NC[base]}22`,border:`2.5px solid ${NC[base]}`,
            borderRadius:24,padding:'16px 36px',textAlign:'center',
            animation:'pop 0.3s cubic-bezier(.36,.07,.19,.97) both'}},
            h('div',{style:{fontSize:40}},NA[base]),
            h('div',{style:{fontSize:20,fontWeight:800,color:NC[base],fontFamily:"'Fredoka One',cursive"}},fn[base]),
            h('div',{style:{fontSize:12,color:'#888',marginTop:3}},last)
          )
        :last
          ?h('div',{key:ak,style:{background:'#2D2D2D',borderRadius:20,padding:'14px 28px',
              textAlign:'center',animation:'pop 0.3s ease both'}},
              h('div',{style:{fontSize:22,color:'#fff',fontWeight:900,fontFamily:"'Fredoka One',cursive"}},
                last.replace('#','♯')),
              h('div',{style:{fontSize:12,color:'#aaa',marginTop:3}},'Sharp key ✨')
            )
          :h('div',{style:{color:'#ccc',fontSize:14}},'← Press a key above!')
    )
  );
}

// ── SONG PLAYER ───────────────────────────────────────────────────────────────
function SongPlayer({song,level,noteStyle,keyScale}){
  const [cidx,setCidx]=useState(-1);
  const [playing,setPlaying]=useState(false);
  const [done,setDone]=useState(false);
  const [mode,setMode]=useState('demo');
  const [score,setScore]=useState(0);
  const [streak,setStreak]=useState(0);
  const tr=useRef([]);
  const clear=()=>{tr.current.forEach(clearTimeout);tr.current=[];};

  // FIX: playDemo actually schedules and plays all notes
  const playDemo=useCallback(()=>{
    clear();setPlaying(true);setDone(false);setCidx(-1);
    let d=100;
    song.notes.forEach((n,i)=>{
      const dur=(song.timing[i]||400)/1000*0.82;
      const t=setTimeout(()=>{
        setCidx(i);
        playNote(n,dur);
      },d);
      tr.current.push(t);
      d+=(song.timing[i]||400)+50;
    });
    const endT=setTimeout(()=>{setPlaying(false);setCidx(-1);setDone(true);},d);
    tr.current.push(endT);
  },[song]);

  const startPlay=()=>{clear();setMode('play');setCidx(0);setScore(0);setStreak(0);setDone(false);};
  const hit=n=>{
    if(mode!=='play'||done)return;
    const i=cidx<0?0:cidx;if(i>=song.notes.length)return;
    if(n===song.notes[i]){
      const ns=streak+1;setStreak(ns);setScore(s=>s+10+(ns>=3?5:0));
      const nx=i+1;setCidx(nx);if(nx>=song.notes.length)setDone(true);
    }
  };
  useEffect(()=>()=>clear(),[]);
  const hl=cidx>=0&&cidx<song.notes.length?song.notes[cidx]:null;
  const prog=mode==='play'&&cidx>0?Math.round((cidx/song.notes.length)*100):0;
  const getLabel=n=>{
    if(n.includes('#')){const b=n.replace(/\d/,'');return(SL[noteStyle]||SL.abc)[b]||b;}
    const b=n.replace(/\d/,'');return(NL[noteStyle]||NL.abc)[b]||b;
  };
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:16}},
    h('div',{style:{display:'flex',gap:10}},
      h('button',{onClick:()=>{setMode('demo');setDone(false);setCidx(-1);setPlaying(false);clear();},
        style:{padding:'9px 20px',borderRadius:20,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,
          background:mode==='demo'?'#FF6B9D':'#F0F0F0',color:mode==='demo'?'#fff':'#555',transition:'all 0.2s'}},
        '👀 Watch Demo'),
      h('button',{onClick:startPlay,
        style:{padding:'9px 20px',borderRadius:20,border:'none',cursor:'pointer',fontWeight:800,fontSize:13,
          background:mode==='play'?'#845EF7':'#F0F0F0',color:mode==='play'?'#fff':'#555',transition:'all 0.2s'}},
        "🎹 I'll Play!")
    ),
    mode==='demo'&&h('button',{onClick:playDemo,disabled:playing,
      style:{padding:'11px 32px',borderRadius:24,border:'none',cursor:playing?'default':'pointer',
        background:playing?'#CCC':'linear-gradient(135deg,#FF6B9D,#845EF7)',
        color:'#fff',fontWeight:900,fontSize:15,boxShadow:playing?'none':'0 4px 16px rgba(132,94,247,0.3)'}},
      playing?'♪ Playing…':'▶  Play Demo'),
    mode==='play'&&!done&&h('div',{style:{textAlign:'center'}},
      h('div',{style:{fontSize:12,color:'#888'}},`Note ${Math.min(Math.max(cidx,0)+1,song.notes.length)} / ${song.notes.length}`),
      h('div',{style:{display:'flex',gap:14,justifyContent:'center',marginTop:5}},
        h('span',{style:{fontWeight:800,fontSize:18,color:'#845EF7'}},`⭐ ${score}`),
        streak>=3&&h('span',{style:{fontWeight:800,fontSize:14,color:'#FF6B9D'}},`🔥 ×${streak}`)
      ),
      h('div',{style:{width:260,height:7,background:'#F0F0F0',borderRadius:4,marginTop:7,overflow:'hidden'}},
        h('div',{style:{width:`${prog}%`,height:'100%',background:'linear-gradient(90deg,#FF6B9D,#845EF7)',
          borderRadius:4,transition:'width 0.2s'}})
      )
    ),
    h(PianoKeyboard,{level,noteStyle,highlightNote:hl,onNotePlay:hit,showLabels:true,keyScale}),
    h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',justifyContent:'center',maxWidth:580}},
      ...song.notes.map((n,i)=>{
        const base=n.replace(/[#\d]/g,'');
        const pi=cidx<0?0:cidx;
        const isDone=mode==='play'?i<pi:(playing&&i<cidx);
        const isAct=(mode==='demo'?cidx:pi)===i&&(mode==='play'||cidx>=0);
        return h('div',{key:i,style:{minWidth:26,height:26,borderRadius:6,display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:9,fontWeight:800,padding:'0 2px',
          background:isDone?(NC[base]||'#845EF7'):isAct?(NC[base]||'#845EF7')+'55':'#F0F0F0',
          color:isDone?'#fff':isAct?'#444':'#bbb',
          border:isAct?`2px solid ${NC[base]||'#845EF7'}`:'2px solid transparent',
          transition:'all 0.15s'}},getLabel(n));
      })
    ),
    done&&h('div',{style:{background:'linear-gradient(135deg,#FF6B9D15,#845EF715)',
      border:'2px solid #FF6B9D',borderRadius:20,padding:'16px 28px',textAlign:'center',
      animation:'fadeIn 0.4s ease'}},
      h('div',{style:{fontSize:32}},'🎉'),
      h('div',{style:{fontWeight:900,fontSize:17,color:'#FF6B9D'}},
        mode==='play'?`Brilliant! You scored ${score} points!`:"That's how it sounds!"),
      h('div',{style:{fontSize:12,color:'#888',marginTop:4}},
        mode==='demo'?'Now try playing it yourself →':'Play again to beat your score!')
    )
  );
}

// ── COMPOSER MODE ─────────────────────────────────────────────────────────────
function ComposerMode({level,noteStyle,keyScale}){
  const [recorded,setRecorded]=useState([]); // [{note,dur}]
  const [isRec,setIsRec]=useState(false);
  const [isPlay,setIsPlay]=useState(false);
  const [title,setTitle]=useState('My Song');
  const [saved,setSaved]=useState(()=>{try{return JSON.parse(localStorage.getItem('pianoCompositions')||'[]');}catch{return[];}});
  const [playIdx,setPlayIdx]=useState(-1);
  const pressTime=useRef({});
  const timers=useRef([]);
  const clearT=()=>{timers.current.forEach(clearTimeout);timers.current=[];};

  const startRec=()=>{setIsRec(true);setRecorded([]);};
  const stopRec=()=>setIsRec(false);

  const onKey=useCallback(full=>{
    if(!isRec)return;
    pressTime.current[full]=Date.now();
  },[isRec]);

  // We capture note-on time; on press we record with a default 400ms duration
  const onKeyDown=useCallback(full=>{
    if(isRec){
      const dur=400; // default, could be refined with hold detection
      setRecorded(r=>[...r,{note:full,dur}]);
    }
  },[isRec]);

  const playBack=()=>{
    if(recorded.length===0)return;
    clearT();setIsPlay(true);setPlayIdx(0);
    let d=80;
    recorded.forEach(({note,dur},i)=>{
      const t=setTimeout(()=>{setPlayIdx(i);playNote(note,dur/1000*0.85);},d);
      timers.current.push(t);
      d+=dur+50;
    });
    timers.current.push(setTimeout(()=>{setIsPlay(false);setPlayIdx(-1);},d));
  };

  const saveComp=()=>{
    if(recorded.length===0)return;
    const comp={id:Date.now(),title:title||'My Song',notes:recorded.map(r=>r.note),
      timing:recorded.map(r=>r.dur),emoji:'🎼',level};
    const next=[comp,...saved].slice(0,20);
    setSaved(next);
    try{localStorage.setItem('pianoCompositions',JSON.stringify(next));}catch(e){}
  };

  const deleteComp=id=>{
    const next=saved.filter(s=>s.id!==id);
    setSaved(next);
    try{localStorage.setItem('pianoCompositions',JSON.stringify(next));}catch(e){}
  };

  const playSaved=comp=>{
    clearT();setIsPlay(true);
    let d=80;
    comp.notes.forEach((note,i)=>{
      const dur=(comp.timing[i]||400)/1000*0.85;
      const t=setTimeout(()=>{playNote(note,dur);},d);
      timers.current.push(t);
      d+=(comp.timing[i]||400)+50;
    });
    timers.current.push(setTimeout(()=>setIsPlay(false),d));
  };

  useEffect(()=>()=>clearT(),[]);

  const hl=isPlay&&playIdx>=0&&playIdx<recorded.length?recorded[playIdx].note:null;

  return h('div',{style:{display:'flex',flexDirection:'column',gap:18}},
    // Header card
    h('div',{style:{background:'linear-gradient(135deg,#FFF0F6,#F3F0FF)',borderRadius:20,
      padding:'18px 20px',border:'2px solid #FF6B9D'}},
      h('div',{style:{fontSize:19,fontWeight:900,marginBottom:4}},'🎼 Composer Mode'),
      h('p',{style:{fontSize:13,color:'#666',lineHeight:1.5}},
        'Record your own melody by pressing keys! Save it and play it back anytime.')
    ),
    // Recording controls
    h('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}},
      !isRec
        ?h('button',{onClick:startRec,
            style:{padding:'11px 24px',borderRadius:20,border:'none',cursor:'pointer',fontWeight:900,
              fontSize:14,background:'#FF6B9D',color:'#fff',
              boxShadow:'0 4px 14px rgba(255,107,157,0.35)'}},
            '🔴 Start Recording')
        :h('button',{onClick:stopRec,
            style:{padding:'11px 24px',borderRadius:20,border:'none',cursor:'pointer',fontWeight:900,
              fontSize:14,background:'#FF4444',color:'#fff',animation:'pulse 1s infinite'}},
            `⏹ Stop  (${recorded.length} notes)`),
      recorded.length>0&&!isRec&&h('button',{onClick:playBack,disabled:isPlay,
        style:{padding:'11px 24px',borderRadius:20,border:'none',cursor:'pointer',fontWeight:900,
          fontSize:14,background:isPlay?'#CCC':'linear-gradient(135deg,#845EF7,#48DBFB)',color:'#fff'}},
        isPlay?'♪ Playing…':'▶ Play Back'),
      recorded.length>0&&!isRec&&h('button',{onClick:()=>setRecorded([]),
        style:{padding:'11px 18px',borderRadius:20,border:'2px solid #F0F0F0',background:'none',
          cursor:'pointer',fontWeight:800,fontSize:13,color:'#888'}},'🗑 Clear')
    ),
    // Recording status
    isRec&&h('div',{style:{background:'#FFF0F0',border:'2px solid #FF4444',borderRadius:16,
      padding:'12px 16px',display:'flex',alignItems:'center',gap:10}},
      h('div',{style:{width:10,height:10,borderRadius:'50%',background:'#FF4444',
        animation:'pulse 1s infinite'}}),
      h('span',{style:{fontSize:13,fontWeight:700,color:'#FF4444'}},
        `Recording… ${recorded.length} note${recorded.length!==1?'s':''} captured. Press keys to record!`)
    ),
    // Keyboard
    h(PianoKeyboard,{level,noteStyle,highlightNote:hl,onNotePlay:onKeyDown,showLabels:true,keyScale}),
    // Recorded sequence preview
    recorded.length>0&&h('div',null,
      h('div',{style:{fontSize:12,color:'#888',marginBottom:6}},`Recorded ${recorded.length} notes:`),
      h('div',{style:{display:'flex',gap:4,flexWrap:'wrap',maxWidth:580}},
        ...recorded.map(({note},i)=>{
          const base=note.replace(/[#\d]/g,'');
          const lbl=note.includes('#')?(SL[noteStyle]||SL.abc)[note.replace(/\d/,'')]||note.replace(/\d/,'')
                                      :(NL[noteStyle]||NL.abc)[base]||base;
          return h('div',{key:i,style:{minWidth:26,height:26,borderRadius:6,display:'flex',alignItems:'center',
            justifyContent:'center',fontSize:9,fontWeight:800,padding:'0 2px',
            background:hl===note&&isPlay?(NC[base]||'#845EF7'):(NC[base]||'#845EF7')+'33',
            color:'#444',border:`1.5px solid ${NC[base]||'#845EF7'}55`,transition:'all 0.15s'}},lbl);
        })
      )
    ),
    // Save section
    recorded.length>0&&!isRec&&h('div',{style:{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap',
      background:'#F8F8FF',borderRadius:16,padding:'14px 16px'}},
      h('input',{value:title,onChange:e=>setTitle(e.target.value),placeholder:'Name your song…',
        style:{flex:1,minWidth:150,padding:'9px 14px',borderRadius:12,border:'2px solid #E0E0E0',
          fontSize:14,fontFamily:"'Nunito',sans-serif",fontWeight:700,outline:'none'}}),
      h('button',{onClick:saveComp,
        style:{padding:'9px 22px',borderRadius:14,border:'none',cursor:'pointer',fontWeight:900,
          fontSize:13,background:'#20C997',color:'#fff'}},
        '💾 Save')
    ),
    // Saved compositions
    saved.length>0&&h('div',null,
      h('div',{style:{fontSize:15,fontWeight:900,color:'#333',marginBottom:10}},'📚 Saved Compositions'),
      h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
        ...saved.map(comp=>h('div',{key:comp.id,style:{background:'#fff',border:'2px solid #F0F0F0',
          borderRadius:16,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}},
          h('span',{style:{fontSize:22}},comp.emoji||'🎼'),
          h('div',{style:{flex:1}},
            h('div',{style:{fontWeight:900,fontSize:14,color:'#333'}},comp.title),
            h('div',{style:{fontSize:11,color:'#aaa',marginTop:1}},`${comp.notes.length} notes`)
          ),
          h('button',{onClick:()=>playSaved(comp),disabled:isPlay,
            style:{padding:'6px 14px',borderRadius:12,border:'none',cursor:'pointer',fontWeight:800,
              fontSize:12,background:'#845EF7',color:'#fff'}},'▶ Play'),
          h('button',{onClick:()=>deleteComp(comp.id),
            style:{padding:'6px 10px',borderRadius:12,border:'2px solid #F0F0F0',background:'none',
              cursor:'pointer',fontSize:13}},'🗑')
        ))
      )
    )
  );
}

    // TABS
    h('div',{style:{display:'flex',background:'#fff',boxShadow:'0 2px 10px rgba(0,0,0,0.07)',overflowX:'auto'}},
      ...TABS.map(t=>h('button',{key:t.id,onClick:()=>swTab(t.id),
        style:{flex:'0 0 auto',padding:'12px 12px',border:'none',background:'none',cursor:'pointer',
          whiteSpace:'nowrap',fontWeight:800,fontSize:12,
          color:tab===t.id?lv.color:'#aaa',
          borderBottom:`3px solid ${tab===t.id?lv.color:'transparent'}`,transition:'all 0.2s'}},
        t.label))
    ),
    // CONTENT
    h('div',{style:{padding:'20px 14px',maxWidth:700,margin:'0 auto'}},
      tab==='explore'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        h('div',{style:{textAlign:'center',marginBottom:18}},
          h('div',{style:{fontSize:20,fontWeight:900,color:'#333'}},'🎹 Free Explore'),
          h('p',{style:{fontSize:13,color:'#888',marginTop:3}},'Press any key and discover the sounds!')
        ),
        h(NoteExplorer,{level,noteStyle:ns,keyScale})
      ),
      tab==='lessons'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        h('div',{style:{marginBottom:16}},
          h('div',{style:{fontSize:20,fontWeight:900,color:'#333'}},'📚 Lessons'),
          h('p',{style:{fontSize:13,color:'#888',marginTop:3}},`${fLessons.length} lessons for ${lv.label}`)
        ),
        h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          ...fLessons.map(l=>{
            const isDone=done.includes(l.id);
            return h('button',{key:l.id,onClick:()=>setLesson(l),
              style:{background:isDone?`${lv.color}12`:'#fff',
                border:`2px solid ${isDone?lv.color:'#F0F0F0'}`,borderRadius:18,
                padding:'14px 18px',textAlign:'left',cursor:'pointer',
                display:'flex',alignItems:'center',gap:12,transition:'all 0.2s'}},
              h('span',{style:{fontSize:26}},l.emoji),
              h('div',{style:{flex:1}},
                h('div',{style:{fontWeight:900,fontSize:14,color:'#333'}},l.title),
                h('div',{style:{fontSize:11,color:'#aaa',marginTop:1}},`${l.steps.length} steps`)
              ),
              isDone&&h('span',{style:{fontSize:16}},'✅'),
              h('span',{style:{color:'#ccc',fontSize:18}},'›')
            );
          })
        )
      ),
      tab==='songs'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        song
          ?h('div',null,
              h('button',{onClick:()=>setSong(null),style:{background:'none',border:'none',color:'#888',
                cursor:'pointer',fontWeight:800,marginBottom:14,fontSize:13}},'← All Songs'),
              h('div',{style:{textAlign:'center',marginBottom:18}},
                h('div',{style:{fontSize:28}},song.emoji),
                h('div',{style:{fontSize:20,fontWeight:900,color:'#333'}},song.title),
                h('div',{style:{fontSize:11,color:'#aaa',marginTop:2}},
                  `${song.notes.length} notes · ${LEVELS[song.level]?.label}`)
              ),
              h(SongPlayer,{song,level,noteStyle:ns,keyScale})
            )
          :h('div',null,
              h('div',{style:{marginBottom:16}},
                h('div',{style:{fontSize:20,fontWeight:900,color:'#333'}},'🎵 Songs to Play'),
                h('p',{style:{fontSize:13,color:'#888',marginTop:3}},`${fSongs.length} songs at your level`)
              ),
              h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
                ...fSongs.map(s=>h('button',{key:s.id,onClick:()=>setSong(s),
                  style:{background:'#fff',border:'2px solid #F0F0F0',borderRadius:18,
                    padding:'14px 18px',textAlign:'left',cursor:'pointer',
                    display:'flex',alignItems:'center',gap:12,transition:'all 0.2s'}},
                  h('span',{style:{fontSize:26}},s.emoji),
                  h('div',{style:{flex:1}},
                    h('div',{style:{fontWeight:900,fontSize:14,color:'#333'}},s.title),
                    h('div',{style:{fontSize:11,color:'#aaa',marginTop:1}},
                      `${s.notes.length} notes · ${LEVELS[s.level]?.label}`)
                  ),
                  h('span',{style:{color:'#ccc',fontSize:18}},'›')
                ))
              )
            )
      ),
      tab==='theory'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        h('div',{style:{textAlign:'center',marginBottom:18}},
          h('div',{style:{fontSize:20,fontWeight:900,color:'#333'}},'🃏 Theory Cards'),
          h('p',{style:{fontSize:13,color:'#888',marginTop:3}},
            `${(TCARDS[level]||[]).length} cards · tap to reveal!`)
        ),
        h(TheoryCards,{key:level,level})
      ),
      tab==='compose'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        h(ComposerMode,{level,noteStyle:ns,keyScale})
      ),
      tab==='teacher'&&h('div',{style:{animation:'fadeIn 0.3s ease'}},
        h(TeacherSection)
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
